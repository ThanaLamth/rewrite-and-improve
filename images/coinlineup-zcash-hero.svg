<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131313"/>
      <stop offset="100%" stop-color="#2b211c"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3f"/>
      <stop offset="100%" stop-color="#b72a17"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4e4"/>
      <stop offset="100%" stop-color="#e1c8a8"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.011" numOctaves="2" seed="5"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" filter="url(#noise)" opacity="0.55"/>
  <circle cx="1360" cy="156" r="256" fill="#61211a" opacity="0.42"/>
  <circle cx="104" cy="204" r="180" fill="#4e1914" opacity="0.34"/>
  <path d="M0 706 C252 610, 578 640, 888 746 S1328 824, 1600 674 L1600 900 L0 900 Z" fill="#090909" opacity="0.58"/>

  <g transform="translate(-12 -54)" filter="url(#shadow)">
    <circle cx="432" cy="402" r="286" fill="none" stroke="#ffffff" stroke-width="18"/>
    <circle cx="432" cy="402" r="268" fill="url(#coin)"/>
    <circle cx="432" cy="402" r="196" fill="#171717"/>
    <circle cx="432" cy="402" r="180" fill="#f5e9d3"/>
    <text x="356" y="472" font-family="Georgia, serif" font-size="230" font-weight="700" fill="#a62b1a">Z</text>
  </g>

  <g transform="translate(850 132) rotate(-6)" filter="url(#shadow)">
    <rect x="-12" y="-12" width="614" height="356" rx="34" fill="none" stroke="#ffffff" stroke-width="16"/>
    <rect x="0" y="0" width="590" height="332" rx="28" fill="url(#panel)"/>
    <polyline points="58,254 150,222 232,228 324,170 410,138 528,86" fill="none" stroke="#bf311a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="528" cy="86" r="18" fill="#ff8241"/>
    <rect x="58" y="52" width="248" height="58" rx="12" fill="#171717"/>
    <text x="84" y="91" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#fff4e4">OPEN INTEREST</text>
    <rect x="58" y="286" width="180" height="18" rx="9" fill="#8d291a" opacity="0.62"/>
    <rect x="258" y="286" width="126" height="18" rx="9" fill="#8d291a" opacity="0.62"/>
  </g>

  <g transform="translate(1036 446)" filter="url(#shadow)">
    <rect x="-12" y="-12" width="272" height="156" rx="28" fill="none" stroke="#ffffff" stroke-width="16"/>
    <rect x="0" y="0" width="248" height="132" rx="22" fill="#171717"/>
    <text x="26" y="56" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ff8a3f">PRICE UP</text>
    <text x="26" y="100" font-family="Arial, sans-serif" font-size="24" fill="#fff4e4">ZEC in focus</text>
  </g>

  <path d="M674 420 C794 372, 870 338, 956 304" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <path d="M674 420 C796 372, 872 338, 956 304" fill="none" stroke="#ff8a3f" stroke-width="6" stroke-linecap="round"/>

  <rect x="88" y="684" width="730" height="128" rx="28" fill="#0d0d0d" opacity="0.84"/>
